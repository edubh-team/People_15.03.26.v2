server {
    listen 80;
    server_name people.edubh.com www.people.edubh.com;

    # 1. OPTIMIZATION: Gzip Compression
    # drastically reduces bandwidth usage for text, css, and js
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # 2. SECURITY: Hardening Headers
    # Prevents clickjacking and some XSS attacks
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # 3. UPLOADS: Large File Support
    # Kept your 50M limit, but added buffer settings to handle imports efficiently
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forward real IP to the app (Crucial for Audit Logs)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 4. TIMEOUTS: Extended for Heavy Operations
        # Kept your 300s limit for long CSV imports
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}